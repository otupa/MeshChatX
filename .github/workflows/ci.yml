name: CI

on:
    push:
        branches:
            - "*"
    pull_request:
        branches:
            - master
            - dev
    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  set -eu
                  SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
                  REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
                  if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
                    echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
                    exit 1
                  fi
                  if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
                    TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
                    git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
                  fi
                  git init -q && git remote add origin "${SERVER}/${REPO}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Setup Poetry
              run: pip install poetry
            - name: Setup Python environment
              run: task setup:be
            - name: pip-audit
              run: |
                  poetry run pip install --upgrade "pip>=26.0" pip-audit
                  poetry run pip-audit
            - name: Install Node dependencies
              run: |
                  . scripts/ci/ci-node-path.sh
                  task deps:fe
            - name: pnpm audit
              run: |
                  . scripts/ci/ci-node-path.sh
                  pnpm audit --audit-level=high
            - name: Lint
              run: |
                  . scripts/ci/ci-node-path.sh
                  set -o pipefail
                  task lint:all 2>&1 | tee lint_results.txt

    build-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  set -eu
                  SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
                  REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
                  if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
                    echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
                    exit 1
                  fi
                  if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
                    TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
                    git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
                  fi
                  git init -q && git remote add origin "${SERVER}/${REPO}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Install dependencies
              run: |
                  . scripts/ci/ci-node-path.sh
                  task deps:fe
            - name: pnpm audit
              run: |
                  . scripts/ci/ci-node-path.sh
                  pnpm audit --audit-level=high
            - name: Determine version
              id: version
              run: |
                  SHORT_SHA=$(git rev-parse --short HEAD)
                  echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
            - name: Build frontend
              run: |
                  . scripts/ci/ci-node-path.sh
                  set -o pipefail
                  task build:fe 2>&1 | tee build_results.txt
              env:
                  VITE_APP_VERSION: ${{ steps.version.outputs.version }}

    test-backend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  set -eu
                  SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
                  REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
                  if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
                    echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
                    exit 1
                  fi
                  if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
                    TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
                    git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
                  fi
                  git init -q && git remote add origin "${SERVER}/${REPO}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Compile backend
              run: |
                  set -o pipefail
                  task compile 2>&1 | tee compile_results.txt

    test-lang:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              run: |
                  set -eu
                  SERVER="${GITEA_SERVER_URL:-${GITHUB_SERVER_URL:-}}"
                  REPO="${GITEA_REPOSITORY:-${GITHUB_REPOSITORY:-}}"
                  if [ -z "$SERVER" ] || [ -z "$REPO" ]; then
                    echo "Checkout: set GITEA_SERVER_URL/GITEA_REPOSITORY or GITHUB_SERVER_URL/GITHUB_REPOSITORY" >&2
                    exit 1
                  fi
                  if [ -n "${GITEA_TOKEN:-}" ] || [ -n "${GITHUB_TOKEN:-}" ]; then
                    TOKEN="${GITEA_TOKEN:-$GITHUB_TOKEN}"
                    git config --global credential.helper "!f() { echo username=x-access-token; echo password=${TOKEN}; }; f"
                  fi
                  git init -q && git remote add origin "${SERVER}/${REPO}.git"
                  git fetch -q --depth=1 origin "${GITHUB_SHA}" && git checkout -q FETCH_HEAD
            - name: Setup Node.js
              run: sh scripts/ci/setup-node.sh 24
            - name: Setup pnpm
              run: sh scripts/ci/setup-pnpm.sh
            - name: Setup Python
              run: sh scripts/ci/setup-python.sh 3.13
            - name: Setup Task
              run: sh scripts/ci/setup-task.sh
            - name: Setup Poetry
              run: pip install poetry
            - name: Install dependencies
              run: |
                  . scripts/ci/ci-node-path.sh
                  task install
            - name: pip-audit
              run: |
                  poetry run pip install --upgrade "pip>=26.0" pip-audit
                  poetry run pip-audit
            - name: pnpm audit
              run: |
                  . scripts/ci/ci-node-path.sh
                  pnpm audit --audit-level=high
            - name: Run language tests
              run: |
                  . scripts/ci/ci-node-path.sh
                  set -o pipefail
                  task test:lang 2>&1 | tee lang_results.txt
